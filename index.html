<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maze Generator & Solver</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>Maze Generator & Solver</h1>

    <div class="controls">
      <label>
        Size:
        <input type="number" id="size" min="11" max="101" value="31" step="2" />
      </label>

      <label>
        Speed:
        <input type="range" id="speed" min="1" max="100" value="30" />
      </label>

      <button id="generateBtn">Generate Maze</button>
      <button id="solveDFSBtn">Solve DFS</button>
      <button id="solveBFSBtn">Solve BFS</button>
      <button id="clearBtn">Clear Path</button>
    </div>

    <canvas id="mazeCanvas"></canvas>

    <div class="stats">
      <p>Best Solve Time: <span id="bestTime">--</span></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
